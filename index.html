<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首頁 | 博士生技 Alcohol Dr. | 甘杯</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 直接將所有 CSS 寫進 HTML，徹底解決 GitHub 讀不到外部檔案的白畫面 Bug */
        :root {
            --black: #000000;
            --dark: #111111;
            --gold: #D4AF37;
            --gold-text: #D4AF37;
            --white: #ffffff;
            --shadow-gold: 2px 2px 10px rgba(212, 175, 55, 0.4);
            --box-shadow-high: 0 10px 40px rgba(0,0,0,0.5);
            --ease-out: cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--black); color: var(--white); line-height: 1.8; overflow-x: hidden; }

        /* Navbar */
        .navbar { position: fixed; top: 0; width: 100%; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 175, 55, 0.1); padding: 15px 0; z-index: 2000; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; }
        
        /* 暫時使用頂級文字排版取代圖片 Logo，避免圖片破圖影響觀感 */
        .logo a { text-decoration: none; font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; color: var(--white); }
        .logo .gold-text { color: var(--gold); }
        
        /* Menu Btn */
        .menu-btn { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 1001; }
        .menu-btn .bar { width: 100%; height: 2px; background-color: var(--gold); transition: 0.3s; }

        /* Nav Links */
        .nav-links { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(20px); display: flex; flex-direction: column; justify-content: center; align-items: center; list-style: none; transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1); border-left: 1px solid rgba(212, 175, 55, 0.2); gap: 30px; }
        .nav-links.active { right: 0; }
        .nav-links a { text-decoration: none; color: var(--white); font-weight: 400; font-size: 1.2rem; position: relative; letter-spacing: 2px; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }

        /* Hero */
        .hero { height: 100dvh; position: relative; background: url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat; display: flex; align-items: center; justify-content: center; padding: 0 20px; }
        .hero-bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%); }
        .hero-content { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 600px; }
        .hero-quote { color: var(--gold); font-size: clamp(4rem, 15vw, 6rem); font-weight: 900; font-style: italic; text-shadow: var(--shadow-gold); margin-bottom: 10px; line-height: 1.1; }
        .hero-subtitle { color: var(--gold-text); font-size: clamp(1.2rem, 5vw, 2.2rem); font-weight: 300; margin-bottom: 40px; letter-spacing: 1px; }
        .hero-buttons { display: flex; flex-direction: column; gap: 15px; align-items: center; }

        /* Buttons */
        .btn { display: inline-block; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 1.1rem; transition: 0.3s var(--ease-out); cursor: pointer; box-shadow: var(--box-shadow-high); width: 100%; max-width: 250px; text-align: center; }
        .btn-gold { background-color: var(--gold); color: var(--black); border: 2px solid var(--gold); }
        .btn-gold:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.5); }
        .btn-outline { background-color: transparent; color: var(--white); border: 2px solid var(--white); }
        .btn-outline:hover { background-color: rgba(255,255,255,0.1); transform: translateY(-5px); }

        /* =========================================
           絕對防呆的原生 CSS 動畫 (不依賴任何外部檔案) 
           ========================================= */
        .fade-in-up { opacity: 0; transform: translateY(30px); animation: fadeInUp 1s ease forwards; }
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 768px) {
            .menu-btn { display: none; }
            .nav-links { position: static; flex-direction: row; width: auto; height: auto; background: transparent; border: none; gap: 35px; }
            .nav-links a { font-size: 1rem; }
            .hero { justify-content: flex-end; padding-right: 15%; }
            .hero-content { text-align: right; }
            .hero-buttons { flex-direction: row; justify-content: flex-end; gap: 20px; }
            .btn { width: auto; max-width: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <span class="gold-text">博士生技</span> Alcohol Dr.
                </a>
            </div>
            
            <div class="menu-btn" id="menuBtn">
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">首頁</a></li>
                <li><a href="about.html">關於我們</a></li>
                <li><a href="science.html">科學研究</a></li>
                <li><a href="purchase.html">購買</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">聯絡我們</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-bg-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-quote fade-in-up">“ 甘杯 ”</h1>
            <p class="hero-subtitle fade-in-up delay-1">把昨夜的喧囂，留在昨夜。</p>
            <div class="hero-buttons fade-in-up delay-2">
                <a href="purchase.html" class="btn btn-gold">立即購買</a>
                <a href="science.html" class="btn btn-outline">了解原理</a>
            </div>
        </div>
    </header>

    <script>
        // 直接將手機選單的 JS 寫死在最底下，保證手機排版運作正常
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');
        const bars = document.querySelectorAll('.bar');

        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            if (navLinks.classList.contains('active')) {
                bars[0].style.transform = 'translateY(9px) rotate(45deg)';
                bars[1].style.transform = 'translateY(-9px) rotate(-45deg)';
            } else {
                bars[0].style.transform = 'translateY(0) rotate(0)';
                bars[1].style.transform = 'translateY(0) rotate(0)';
            }
        });
    </script>
</body>
</html>
